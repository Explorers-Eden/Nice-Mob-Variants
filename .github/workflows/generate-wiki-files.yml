name: Generate Wiki Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-wiki-files:
    runs-on: ubuntu-latest
    env:
      NODE_PATH: ${{ github.workspace }}/.cache/wiki-node-deps/node_modules

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22


      - name: Install wiki script dependencies
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .cache/wiki-node-deps
          npm --prefix .cache/wiki-node-deps init -y >/dev/null
          npm --prefix .cache/wiki-node-deps install --no-save --package-lock=false prismarine-nbt pngjs sharp js-yaml

      - name: Cache vanilla assets
        uses: actions/cache@v4
        with:
          path: .cache/vanilla-assets
          key: vanilla-assets-${{ hashFiles('release_infos.yml', 'pack.mcmeta') }}

      - name: Download vanilla assets
        run: node tools/scripts/download-vanilla-assets.js

      - name: Generate loot table markdown
        shell: bash
        run: |
          set -euo pipefail
          if find data -type f -path '*/loot_table/*.json' -print -quit 2>/dev/null | grep -q .; then
            node tools/scripts/generate-loot-tables.js
          else
            echo "No loot table files found; skipping loot table markdown generation."
          fi

      - name: Generate structure markdown
        shell: bash
        run: |
          set -euo pipefail
          if find data -type f \( -path '*/worldgen/structure/*.json' -o -path '*/structure/*.nbt' \) -print -quit 2>/dev/null | grep -q .; then
            node tools/scripts/generate-structures.js
          else
            echo "No structure files found; skipping structure markdown generation."
          fi

      - name: Generate structure preview images
        shell: bash
        run: |
          set -euo pipefail
          if find data -type f \( -path '*/worldgen/structure/*.json' -o -path '*/structure/*.nbt' \) -print -quit 2>/dev/null | grep -q .; then
            node tools/scripts/generate-structure-previews.js
          else
            echo "No structure files found; skipping structure preview PNG generation."
          fi


      - name: Generate entity variant render images
        shell: bash
        env:
          ENTITY_RENDER_DEBUG: "0"
        run: |
          set -euo pipefail
          mkdir -p wiki/images/entity
          if [ ! -d data ]; then
            echo "No data directory found; skipping entity render PNG generation."
            exit 0
          fi
          if find data -type f \( -path '*/cat_variant/*.json' -o -path '*/chicken_variant/*.json' -o -path '*/frog_variant/*.json' -o -path '*/pig_variant/*.json' -o -path '*/cow_variant/*.json' -o -path '*/wolf_variant/*.json' -o -path '*/zombie_nautilus_variant/*.json' \) -print -quit 2>/dev/null | grep -q .; then
            node tools/scripts/generate-entity-renders.js
          else
            echo "No entity variant JSON files found; skipping entity render PNG generation."
          fi

      - name: Generate NPC player skin preview images
        shell: bash
        run: |
          set -euo pipefail
          if find assets -type f \( -path '*/entity/npc/*/*.png' -o -path '*/entity/mannequin/*/*.png' -o -path '*/textures/entity/npc/*/*.png' -o -path '*/textures/entity/mannequin/*/*.png' \) -print -quit 2>/dev/null | grep -q .; then
            node tools/scripts/generate-player-skin-renders.js
          fi

      - name: Show generated wiki files
        shell: bash
        run: |
          set -euo pipefail
          markdown_count=0
          structure_count=0
          entity_count=0
          [ -d wiki/markdown ] && markdown_count=$(find wiki/markdown -type f -name "*.md" | wc -l | tr -d ' ')
          [ -d wiki/images/structures ] && structure_count=$(find wiki/images/structures -type f -name "*.png" | wc -l | tr -d ' ')
          [ -d wiki/images/entity ] && entity_count=$(find wiki/images/entity -type f -name "*.png" | wc -l | tr -d ' ')
          echo "Wiki output: ${markdown_count} markdown, ${structure_count} structure preview(s), ${entity_count} entity preview(s)."

      - name: Upload generated preview images as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-structure-preview-images
          path: wiki/images/structures/**/*.png
          if-no-files-found: warn


      - name: Upload generated entity render output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-entity-render-output
          path: wiki/images/entity
          if-no-files-found: warn

      - name: Commit generated wiki files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ ! -d wiki ]; then
            echo "No wiki directory exists; skipping commit."
            exit 0
          fi

          git add -A wiki

          if git diff --cached --quiet; then
            echo "No generated wiki changes to commit."
            exit 0
          fi

          git commit -m "Generate wiki files"
          git push
